  - type: faq
    title: FAQ
    id: faq
    theme: is-light width-box box-fill
    questions:
      - question: ¿Quién organiza el evento?
        answer: >-
          El evento lo montamos un grupo de voluntarios que nos reunimos
          alrededor de MadridJUG, junto con la ayuda de [Next
          Digital](https://www.nextdigital.es/), [Siviendo
          Código](https://sirviendocodigo.com/) e [Incremental
          Steps](https://incsteps.com/).
      - question: ¿Debo llevar una charla preparada?
        answer: >-
          Puedes preparar una charla y proponerla. Pero deberá salir votada por
          los asistentes y la sala que esté disponible disponga de
          proyector/pantalla.
      - question: 'Creo que tengo poco que aportar, ¿debería ir?'
        answer: >-
          Por supuesto!! Seguro que sabes muchas cosas que podrás compartir con
          otros asistentes.


          Además, recuerda: la única pregunta estúpida es aquella que se queda
          sin preguntar.
      - question: ¿Se van a grabar las sesiones?
        answer: >-
          No, debido a la dinámica de las interacciones, donde muchas personas
          pueden hablar a lo largo de las sesiones, no es posible grabar bien a
          todo el mundo.
      - question: I speak English, can I still participate?
        answer: >-
          Yes, you're welcome to attend, and we'll do our best to help you take part.
          However, we'd like to keep the event primarily in Spanish, as it's aimed at
          our local community and most people will feel more comfortable speaking Spanish.
          That said, last year a few attendees had only basic Spanish, and we were happy
          to speak with them in English.
