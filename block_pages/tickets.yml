url: /tickets/
menu:
  - text: Home
    url: /
    highlight: true
blocks:
  - type: header
    title: Entradas
    description: |-
      El precio de la entrada se destina íntegramente a cubrir los costes del
      evento, como el sistema de ticketing y la comida.

      JMad es un evento organizado de forma voluntaria: todo el equipo dedica su
      tiempo y esfuerzo para crear un espacio accesible e inclusivo para la comunidad.
      Nadie del equipo obtiene beneficio económico del evento.
  - type: tickets
    id: tickets
    theme: is-light width-box box-fill
    features:
      - id: entrada
        text: |- 
          **Entrada al evento y comida.**
      - id: diversity
        text: |-
          **Entrada al evento y comida.**
          
          Las entradas Diversity están pensadas
          para facilitar la participación de personas que sienten que pertenecen
          a colectivos infra-representados dentro de la comunidad tecnológica.
          Por ejemplo, mujeres, personas LGTBIQ+, personas con discapacidad,
          inmigrantes, estudiantes, parados o personas en sus primeros años de
          carrera, entre otros.  
          No hay ningún tipo de comprobación ni restricción: si crees que
          esta entrada te ayuda a poder asistir al evento, eres bienvenido/a a
          comprarla.  
          Nuestro objetivo es hacer JMad más accesible e inclusivo para todas las personas.
      - id: sponsor
        text: |-
          **Sponsor**.
          
          Incluye tres entradas al evento, logo en la web, anuncios y agradecimientos
          en redes sociales, mención en apertura y cierre.  
          Estamos abiertos a propuestas de sponsor y distintas formas de colaborar, contacta con
          nosotros en **madridjug-coordinators@googlegroups.com**
    tickets:
      - name: Entrada general
        pricing: 35€ (IVA incluido)
        img: /files/tickets/ticket.png
        buy:
          text: Comprar
          url: 'https://my.weezevent.com/jmad-openspace-2026'
          disabled: false
        features:
          - entrada
      - name: Entrada Diversity
        pricing: 17€ (IVA incluido)
        img: /files/tickets/ticket.png
        buy:
          text: Comprar
          url: 'https://my.weezevent.com/jmad-openspace-2026'
          disabled: false
        features:
          - diversity
      - name: Sponsor
        pricing: 500€ (IVA incluido)
        img: /files/tickets/ticket.png
        buy:
          text: Comprar
          url: 'https://my.weezevent.com/jmad-openspace-2026'
          disabled: false
        features:
          - sponsor
